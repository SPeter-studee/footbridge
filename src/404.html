<!DOCTYPE html>
<html lang="hu">
<head>

  <link rel="icon" href="/assets/logos/footbridge_favicon.svg" type="image/svg+xml">

<body>
<main id="main-content">
  <section class="section" style="min-height: 70vh; display: flex; align-items: center;">
    <div class="container" style="max-width: 560px;">
      <p class="eyebrow" style="margin-bottom: var(--space-4);">404</p>
      <h1 style="margin-bottom: var(--space-4);">Ez az oldal nem létezik</h1>
      <p style="color: var(--color-muted); margin-bottom: var(--space-10);">
        Vagy nem létezett soha, vagy költözött. Ahogy a hidaknál is, néha újraépítjük az átkelőket.
      </p>
      <nav style="display: flex; flex-direction: column; gap: var(--space-3);" aria-label="Ajánlott oldalak">
        <a href="/" style="display:inline-block;padding:14px 24px;color:#1F4D3A;font-size:var(--text-base);font-weight:500;text-decoration:none;" style="justify-content: flex-start;">Főoldal →</a>

        <a href="/kapcsolat" style="display:inline-block;padding:14px 24px;color:#1F4D3A;font-size:var(--text-base);font-weight:500;text-decoration:none;" style="justify-content: flex-start;">Kapcsolat →</a>
      </nav>
      <p style="margin-top: var(--space-8); font-size: var(--text-sm); color: var(--color-muted);">
        Ha valami konkrétat keresel:
        <a href="mailto:hello@footbridge.hu" style="color: var(--color-green);">hello@footbridge.hu</a>
      </p>
    </div>
  </section>
</main>
<script src="/scripts/main.js"></script>
</body>
</html>
